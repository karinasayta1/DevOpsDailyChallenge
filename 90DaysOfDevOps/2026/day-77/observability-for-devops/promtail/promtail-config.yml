server:
  http_listen_port: 9080

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # - job_name: docker
  #   static_configs:
  #     - targets:
  #         - localhost
  #       labels:
  #         job: docker
  #         __path__: /var/lib/docker/containers/*/*-json.log
  #   pipeline_stages:
  #     - docker: {}
  #Above job doesn't provide container specific labels
  #Add below configs to get container_name, container_id labels
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock  # ← Connects to Docker API
        refresh_interval: 5s
    relabel_configs:
      # Force job="docker" on ALL containers
      - target_label: 'job'
        replacement: 'docker'
      # Extract container name (removes leading /)
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container_name'
      # Keep container_id for reference
      - source_labels: ['__meta_docker_container_id']
        target_label: 'container_id'
      # Keep stream label
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: 'stream'
    pipeline_stages:
      - docker: {}
